apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  project: demo-project
  source:
    repoURL: https://github.com/gauravrajlaxmi/helm-argo-info-origin.git
    targetRevision: main
    path: nginx-app/
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
